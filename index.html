<script>
const API="https://o6teddrptd.execute-api.ap-southeast-1.amazonaws.com/prod";

/* SAFE ELEMENT */
function el(id){
    return document.getElementById(id);
}

/* MENU */
function toggleMenu(){
    const s = el("sidebar");
    if(s) s.classList.toggle("active");
}

function showPage(p){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    const page = el(p);
    if(page) page.classList.add("active");
}

/* SENSOR */
async function getSensor(){
    try{
        const r = await fetch(API+"/sensor");
        const d = await r.json();

        if(!Array.isArray(d) || d.length === 0) return;

        const x = d[d.length-1];

        if(el("temp")) el("temp").innerText = x.temperature || "--";
        if(el("hum")) el("hum").innerText = x.humidity || "--";
        if(el("light")) el("light").innerText = x.light || "--";

        if(el("temp2")) el("temp2").innerText = x.temperature || "--";
        if(el("hum2")) el("hum2").innerText = x.humidity || "--";
        if(el("light2")) el("light2").innerText = x.light || "--";

    }catch(e){
        console.log("Sensor error:", e);
    }
}

/* AKTIVITAS */
async function getActivities(){
    try{
        const r = await fetch(API+"/activities");
        const d = await r.json();

        if(!Array.isArray(d)) return;

        let html = "";

        d.forEach(a=>{
            html += `
            <div class="list-item">
                <strong>${a.judul || "-"}</strong><br>
                <small>${a.tanggal || "-"}</small><br>
                <div style="color:#22c55e;font-size:12px">
                    ${a.kategori || "Umum"}
                </div>
            </div>`;
        });

        const list = el("list");
        if(list) list.innerHTML = html;

    }catch(e){
        console.log("Aktivitas error:", e);
    }
}

/* SIMPAN */
async function tambah(){
    try{
        await fetch(API+"/activities",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                judul: el("judul")?.value || "",
                tanggal: el("tanggal")?.value || "",
                kategori: el("topik")?.value || "Umum"
            })
        });

        alert("Tersimpan");
        resetForm();
        getActivities();

    }catch(e){
        alert("Gagal simpan");
        console.log(e);
    }
}

/* RESET */
function resetForm(){
    document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

/* INIT (PALING AMAN) */
document.addEventListener("DOMContentLoaded", function(){
    getSensor();
    getActivities();

    setInterval(getSensor,3000);
});
</script>
