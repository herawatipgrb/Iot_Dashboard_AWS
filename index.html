<!DOCTYPE html>
<html>
<head>
<title>Cloud Monitoring Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

/* TOPBAR */
.topbar {
    height: 60px;
    background: #020617;
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: fixed;
    width: 100%;
    top: 0;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100%;
    background: #020617;
    position: fixed;
    top: 60px;
    left: -220px;
    padding: 20px;
    transition: 0.3s;
}
.sidebar.active { left: 0; }

.sidebar a {
    display: block;
    color: #94a3b8;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
}
.sidebar a:hover { background: #1e293b; color: white; }

/* MAIN */
.main {
    margin-top: 60px;
    padding: 25px 20px;
    max-width: 650px;
    margin-left: auto;
    margin-right: auto;
}

/* SECTION */
.section { display: none; }
.section.active { display: block; }

/* CARD */
.card {
    background: linear-gradient(145deg, #1e293b, #111827);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 18px;
    transition: 0.3s;
}
.card:hover { transform: translateY(-5px); }

/* DASHBOARD */
.card-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #94a3b8;
}

.big {
    font-size: 42px;
    font-weight: bold;
    transition: 0.3s;
}
.unit { font-size: 14px; color: #94a3b8; }

/* SENSOR */
.sensor-box {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
    transition:0.3s;
}
.sensor-value {
    font-size:22px;
    font-weight:bold;
    transition:0.3s;
}

/* ANIMASI */
.update {
    transform: scale(1.2);
    color:#22c55e;
}
.sensor-box.active {
    box-shadow:0 0 15px #22c55e;
}

/* AKTIVITAS */
.grid-form {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
.form-group { display:flex; flex-direction:column; }
.form-group.full { grid-column:span 2; }

.form-group input,
.form-group textarea,
select {
    padding:10px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
}

/* BUTTON */
.btn-group { display:flex; gap:10px; margin-top:10px; }
button { padding:10px; border:none; border-radius:10px; }
.btn-save{background:#22c55e;color:white;}
.btn-cancel{background:red;color:white;}

/* LIST */
.list-item {
    background:#111827;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

/* TENTANG */
.profile { text-align:center; margin-top:10px;}
.profile-name{font-weight:bold;}

</style>
</head>

<body>

<div class="topbar">
    <div onclick="toggleMenu()">☰</div>
    <h3 style="margin-left:10px;">Dashboard</h3>
</div>

<div class="sidebar" id="sidebar">
    <a onclick="showPage('dashboard')">Dashboard</a>
    <a onclick="showPage('sensor')">Sensor Monitor</a>
    <a onclick="showPage('aktivitas')">Aktivitas Kuliah</a>
    <a onclick="showPage('tentang')">Tentang</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<div class="card">
<div class="card-header"><span>SUHU</span></div>
<div class="card-body">
<div><div class="big" id="temp">--</div><div class="unit">°C</div></div>
</div>
</div>

<div class="card">
<div class="card-header"><span>KELEMBAPAN</span></div>
<div class="card-body">
<div><div class="big" id="hum">--</div><div class="unit">%</div></div>
</div>
</div>

<div class="card">
<div class="card-header"><span>CAHAYA</span></div>
<div class="card-body">
<div><div class="big" id="light">--</div><div class="unit">lux</div></div>
</div>
</div>

</div>

<!-- SENSOR -->
<div id="sensor" class="section">
<h2>Sensor Monitor</h2>

<div class="sensor-box">
Suhu: <span id="temp2" class="sensor-value">--</span>
</div>

<div class="sensor-box">
Kelembapan: <span id="hum2" class="sensor-value">--</span>
</div>

<div class="sensor-box">
Cahaya: <span id="light2" class="sensor-value">--</span>
</div>

</div>

<!-- AKTIVITAS -->
<div id="aktivitas" class="section">
<h2>Aktivitas Kuliah</h2>

<div class="card">
<div class="grid-form">

<div class="form-group">
<label>Judul Aktivitas</label>
<input id="judul">
</div>

<div class="form-group">
<label>Tanggal</label>
<input id="tanggal" type="date">
</div>

<div class="form-group">
<label>Pertemuan</label>
<input id="pertemuan">
</div>

<div class="form-group">
<label>Topik</label>
<select id="topik">
<option>Praktikum</option>
<option>Diskusi</option>
<option>Materi</option>
<option>Tugas</option>
</select>
</div>

</div>

<div class="btn-group">
<button class="btn-save" onclick="tambah()">Simpan</button>
</div>

</div>

<div id="list"></div>
</div>

<!-- TENTANG -->
<div id="tentang" class="section">
<h2>Tentang</h2>

<div class="card">
<div class="profile"><div class="profile-name">Herawati Syalomita Pangaribuan</div></div>
<div class="profile"><div class="profile-name">Sabrina Sitohang</div></div>
<div class="profile"><div class="profile-name">Esther Hutagaol</div></div>
</div>

</div>

</div>

<script>
const API="https://o6teddrptd.execute-api.ap-southeast-1.amazonaws.com/prod";

function el(id){return document.getElementById(id);}

function toggleMenu(){el("sidebar").classList.toggle("active");}

function showPage(p){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
el(p).classList.add("active");
}

/* ANIMASI */
function animate(id){
const e=el(id);
if(!e)return;
e.classList.add("update");
setTimeout(()=>e.classList.remove("update"),300);
}

function glow(){
document.querySelectorAll(".sensor-box").forEach(b=>{
b.classList.add("active");
setTimeout(()=>b.classList.remove("active"),400);
});
}

/* SENSOR */
async function getSensor(){
try{
const r=await fetch(API+"/sensor");
const d=await r.json();
if(!d.length)return;

const x=d[d.length-1];

["temp","hum","light","temp2","hum2","light2"].forEach(id=>{
if(el(id)){
el(id).innerText=x.temperature;
animate(id);
}
});

glow();

}catch(e){console.log(e);}
}

/* AKTIVITAS */
async function getActivities(){
const r=await fetch(API+"/activities");
const d=await r.json();

let h="";
d.forEach(a=>{
h+=`
<div class="list-item">
<strong>${a.judul}</strong>
<span>${a.tanggal}</span>
</div>`;
});

el("list").innerHTML=h;
}

/* SIMPAN */
async function tambah(){
await fetch(API+"/activities",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
judul:judul.value,
tanggal:tanggal.value,
kategori:topik.value
})
});
getActivities();
}

/* INIT */
getSensor();
getActivities();
setInterval(getSensor,3000);
</script>

</body>
</html>
