<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Monitoring Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e1e;
    color: #e5e5e5;
}

/* TOPBAR */
.topbar {
    height: 60px;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 999;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100%;
    background: #2a2a2a;
    position: fixed;
    top: 60px;
    left: -220px;
    padding: 20px;
    transition: 0.3s;
}
.sidebar.active { left: 0; }

.sidebar a {
    display: block;
    color: #b3b3b3;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
}
.sidebar a:hover {
    background: #3a3a3a;
    color: white;
}

/* MAIN */
.main {
    margin-top: 60px;
    padding: 25px 20px;
    max-width: 650px;
    margin-left: auto;
    margin-right: auto;
}

/* SECTION */
.section { display: none; }
.section.active { display: block; }

/* CARD */
.card {
    background: linear-gradient(145deg, #2f2f2f, #252525);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 18px;
}

/* DASHBOARD */
.card-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #b3b3b3;
}

.tag { padding:3px 8px; border-radius:6px; font-size:10px;}
.tag.blue{background:#3b82f6;}
.tag.cyan{background:#06b6d4;}
.tag.yellow{background:#f59e0b;}

.card-body {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.big { font-size: 42px; font-weight: bold; }
.unit { font-size: 14px; color: #b3b3b3; }

/* SENSOR */
.sensor-box {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2f2f2f;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
}
.sensor-label{color:#b3b3b3;}
.sensor-value{font-size:22px;font-weight:bold;}

/* AKTIVITAS (TIDAK DIUBAH) */
.grid-form {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full { grid-column: span 2; }

.form-group label {
    font-size:12px;
    color:#b3b3b3;
    margin-bottom:4px;
}

.form-group input,
.form-group textarea,
select {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1a1a1a;
    color:#e5e5e5;
}

.form-group input:focus,
.form-group textarea:focus,
select:focus {
    outline:none;
    box-shadow:0 0 8px rgba(255,255,255,0.2);
}

.hint {
    font-size:11px;
    color:#888;
}

/* BUTTON */
.btn-group {
    display:flex;
    gap:10px;
    margin-top:10px;
}

button {
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
.btn-save{background:#22c55e;color:white;}
.btn-cancel{background:#ef4444;color:white;}

/* LIST */
.list-item {
    background:#2a2a2a;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

/* TENTANG */
.profile { text-align:center; margin-top:10px;}
.profile-name{font-weight:bold;}

/* RESPONSIVE */
@media (max-width: 600px){

    .main {
        padding: 15px 10px;
        max-width: 100%;
    }

    .card {
        padding: 15px;
        border-radius: 15px;
    }

    .big {
        font-size: 28px;
    }

    .sidebar {
        width: 180px;
    }

    .grid-form {
        grid-template-columns: 1fr 1fr;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <div onclick="toggleMenu()">☰</div>
    <h3 style="margin-left:10px;">Dashboard</h3>
</div>

<div class="sidebar" id="sidebar">
    <a onclick="showPage('dashboard')">Dashboard</a>
    <a onclick="showPage('sensor')">Sensor Monitor</a>
    <a onclick="showPage('aktivitas')">Aktivitas Kuliah</a>
    <a onclick="showPage('tentang')">Tentang</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<div class="card">
<div class="card-header">
<span>SUHU</span><span class="tag blue">DHT22</span>
</div>
<div class="card-body">
<div><div class="big" id="temp">--</div><div class="unit">°C</div></div>
</div>
</div>

<div class="card">
<div class="card-header">
<span>KELEMBAPAN</span><span class="tag cyan">DHT22</span>
</div>
<div class="card-body">
<div><div class="big" id="hum">--</div><div class="unit">%</div></div>
</div>
</div>

<div class="card">
<div class="card-header">
<span>CAHAYA</span><span class="tag yellow">BH1750</span>
</div>
<div class="card-body">
<div><div class="big" id="light">--</div><div class="unit">lux</div></div>
</div>
</div>

</div>

<!-- SENSOR -->
<div id="sensor" class="section">
<h2>Sensor Monitor</h2>

<div class="sensor-box">
<div><div class="sensor-label">Suhu</div><div id="temp2" class="sensor-value">--</div></div>
</div>

<div class="sensor-box">
<div><div class="sensor-label">Kelembapan</div><div id="hum2" class="sensor-value">--</div></div>
</div>

<div class="sensor-box">
<div><div class="sensor-label">Cahaya</div><div id="light2" class="sensor-value">--</div></div>
</div>

</div>

<!-- AKTIVITAS (ASLI) -->
<div id="aktivitas" class="section">
<h2>Aktivitas Kuliah</h2>

<div class="card">

<div class="grid-form">

<div class="form-group">
<label>Judul Aktivitas</label>
<input id="judul">
</div>

<div class="form-group">
<label>Tanggal</label>
<input id="tanggal" type="date">
<span class="hint">Pilih tanggal kegiatan</span>
</div>

<div class="form-group">
<label>Pertemuan Ke</label>
<input id="pertemuan">
</div>

<div class="form-group">
<label>Topik</label>
<select id="topik">
<option value="">Pilih Topik</option>
<option>Praktikum</option>
<option>Diskusi</option>
<option>Materi</option>
<option>Tugas</option>
</select>
</div>

<div class="form-group">
<label>Dosen</label>
<input id="dosen">
</div>

<div class="form-group full">
<label>Deskripsi</label>
<textarea id="deskripsi"></textarea>
</div>

<div class="form-group full">
<label>Materi</label>
<textarea id="materi"></textarea>
</div>

<div class="form-group full">
<label>Catatan</label>
<textarea id="catatan"></textarea>
</div>

</div>

<div class="btn-group">
<button class="btn-cancel" onclick="resetForm()">Batal</button>
<button class="btn-save" onclick="tambah()">Simpan</button>
</div>

</div>

<div class="card">
<div id="list"></div>
</div>

</div>

<!-- TENTANG -->
<div id="tentang" class="section">
<h2>Tentang</h2>

<div class="card">
<p style="text-align:center;">Dashboard Monitoring IoT berbasis Cloud & AWS</p>
<div class="profile"><div class="profile-name">Herawati Syalomita Pangaribuan</div></div>
</div>

</div>

</div>

<script>
const API="https://o6teddrptd.execute-api.ap-southeast-1.amazonaws.com/prod";

function toggleMenu(){sidebar.classList.toggle("active");}

function showPage(p){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

async function getSensor(){
const r=await fetch(API+"/sensor");
const d=await r.json();
const x=d[d.length-1];

temp.innerText=x.temperature;
hum.innerText=x.humidity;
light.innerText=x.light;

temp2.innerText=x.temperature;
hum2.innerText=x.humidity;
light2.innerText=x.light;
}

async function getActivities(){
const r=await fetch(API+"/activities");
const d=await r.json();

let h="";
d.forEach(a=>{
h+=`
<div class="list-item">
<strong>${a.judul}</strong>
<span>${a.tanggal}</span>
<div style="color:#22c55e;font-size:12px">${a.kategori || "Umum"}</div>
</div>
`;
});
list.innerHTML=h;
}

async function tambah(){
await fetch(API+"/activities",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
judul:judul.value,
tanggal:tanggal.value,
kategori:topik.value || "Umum"
})
});
alert("Tersimpan");
resetForm();
getActivities();
}

function resetForm(){
document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

getSensor();
getActivities();
setInterval(getSensor,3000);
</script>

</body>
</html>
