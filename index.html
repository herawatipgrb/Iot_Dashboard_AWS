<script>
const API="https://o6teddrptd.execute-api.ap-southeast-1.amazonaws.com/prod";

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

function showPage(p){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(p).classList.add("active");
}

/* SENSOR */
async function getSensor(){
    const r=await fetch(API+"/sensor");
    const d=await r.json();
    const x=d[d.length-1];

    temp.innerText=x.temperature;
    hum.innerText=x.humidity;
    light.innerText=x.light;

    temp2.innerText=x.temperature;
    hum2.innerText=x.humidity;
    light2.innerText=x.light;
}

/* AKTIVITAS (FULL FIX + SEMUA FIELD) */
async function getActivities(){
    const r = await fetch(API+"/activities");
    const d = await r.json();

    let h = "";

    d.forEach(a=>{
        h += `
        <div class="list-item">
            <strong>${a.judul}</strong><br>
            <small>${a.tanggal}</small><br>

            <div style="color:#22c55e;font-size:12px">
                ${a.kategori || "Umum"}
            </div>

            <div style="font-size:12px;color:#94a3b8">
                Pertemuan: ${a.pertemuan || "-"} <br>
                Dosen: ${a.dosen || "-"}
            </div>

            <div style="margin-top:5px;font-size:12px">
                ${a.deskripsi || ""}
            </div>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = h;
}

/* SIMPAN DATA (SEMUA INPUT MASUK) */
async function tambah(){

    await fetch(API+"/activities",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            judul: judul.value,
            tanggal: tanggal.value,
            kategori: topik.value || "Umum",
            pertemuan: pertemuan.value,
            dosen: dosen.value,
            deskripsi: deskripsi.value,
            materi: materi.value,
            catatan: catatan.value
        })
    });

    alert("Tersimpan");
    resetForm();
    getActivities();
}

/* RESET */
function resetForm(){
    document.querySelectorAll("input,textarea").forEach(i=>i.value="");
    document.getElementById("topik").value="";
}

/* INIT */
getSensor();
getActivities();

setInterval(getSensor,3000);
setInterval(getActivities,5000);
</script>
