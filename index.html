<script>
const API="https://o6teddrptd.execute-api.ap-southeast-1.amazonaws.com/prod";

/* AMANIN ELEMENT */
function el(id){
    return document.getElementById(id);
}

/* MENU */
function toggleMenu(){
    const sb = el("sidebar");
    if(sb) sb.classList.toggle("active");
}

function showPage(p){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    const page = el(p);
    if(page) page.classList.add("active");
}

/* SENSOR (ANTI ERROR) */
async function getSensor(){
try{
    const r=await fetch(API+"/sensor");
    const d=await r.json();

    if(!d || d.length===0) return;

    const x=d[d.length-1];

    if(el("temp")) el("temp").innerText = x.temperature ?? "--";
    if(el("hum")) el("hum").innerText = x.humidity ?? "--";
    if(el("light")) el("light").innerText = x.light ?? "--";

    if(el("temp2")) el("temp2").innerText = x.temperature ?? "--";
    if(el("hum2")) el("hum2").innerText = x.humidity ?? "--";
    if(el("light2")) el("light2").innerText = x.light ?? "--";

}catch(e){
    console.log("Sensor error:",e);
}
}

/* AKTIVITAS (ANTI ERROR) */
async function getActivities(){
try{
    const r=await fetch(API+"/activities");
    const d=await r.json();

    if(!Array.isArray(d)) return;

    let h="";

    d.forEach(a=>{
        h += `
        <div class="list-item">
            <strong>${a.judul || "-"}</strong><br>
            <small>${a.tanggal || "-"}</small><br>
            <div style="color:#22c55e;font-size:12px">
                ${a.kategori || "Umum"}
            </div>
        </div>
        `;
    });

    const listEl = el("list");
    if(listEl) listEl.innerHTML = h;

}catch(e){
    console.log("Aktivitas error:",e);
}
}

/* SIMPAN */
async function tambah(){
try{
    const judulEl = el("judul");
    const tanggalEl = el("tanggal");
    const topikEl = el("topik");

    await fetch(API+"/activities",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            judul: judulEl ? judulEl.value : "",
            tanggal: tanggalEl ? tanggalEl.value : "",
            kategori: topikEl ? (topikEl.value || "Umum") : "Umum"
        })
    });

    alert("Tersimpan");
    resetForm();
    getActivities();

}catch(e){
    alert("Gagal simpan");
    console.log(e);
}
}

/* RESET */
function resetForm(){
    document.querySelectorAll("input,textarea").forEach(i=>i.value="");
    const topikEl = el("topik");
    if(topikEl) topikEl.value="";
}

/* INIT */
getSensor();
getActivities();

setInterval(getSensor,3000);
</script>
