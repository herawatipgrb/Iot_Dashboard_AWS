<!DOCTYPE html>
<html>
<head>
<title>Cloud Monitoring Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

/* TOPBAR */
.topbar {
    height: 60px;
    background: #020617;
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: fixed;
    width: 100%;
    top: 0;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100%;
    background: #020617;
    position: fixed;
    top: 60px;
    left: -220px;
    padding: 20px;
    transition: 0.3s;
}
.sidebar.active { left: 0; }

.sidebar a {
    display: block;
    color: #94a3b8;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
}
.sidebar a:hover { background: #1e293b; color: white; }

/* MAIN */
.main {
    margin-top: 60px;
    padding: 20px;
    max-width: 650px;
    margin-left: auto;
    margin-right: auto;
}

/* SECTION */
.section { display: none; }
.section.active { display: block; }

/* CARD */
.card {
    background: linear-gradient(145deg, #1e293b, #111827);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    transition: 0.3s;
}
.card:hover { transform: translateY(-5px); }

/* TEXT */
.big {
    font-size: 40px;
    font-weight: bold;
    transition: 0.3s;
}
.unit { font-size: 14px; color: #94a3b8; }

/* SENSOR */
.sensor-box {
    display:flex;
    justify-content:space-between;
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
    transition:0.3s;
}
.sensor-value { font-size:22px; }

/* ANIMASI */
.update {
    transform: scale(1.2);
    color:#22c55e;
}
.sensor-box.active {
    box-shadow:0 0 15px #22c55e;
}

/* FORM */
.grid-form {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}
.form-group { display:flex; flex-direction:column; }
.form-group.full { grid-column: span 2; }

input, textarea, select {
    padding:10px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
}

/* BUTTON */
.btn-group { display:flex; gap:10px; margin-top:10px; }
button { padding:10px; border:none; border-radius:10px; }
.btn-save{background:#22c55e;color:white;}
.btn-cancel{background:red;color:white;}

/* LIST */
.list-item {
    background:#111827;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

/* PROFILE */
.profile { text-align:center; margin-top:10px;}
.profile-name{font-weight:bold;}
</style>
</head>

<body>

<div class="topbar">
    <div onclick="toggleMenu()">☰</div>
    <h3 style="margin-left:10px;">Dashboard</h3>
</div>

<div class="sidebar" id="sidebar">
    <a onclick="showPage('dashboard')">Dashboard</a>
    <a onclick="showPage('sensor')">Sensor Monitor</a>
    <a onclick="showPage('aktivitas')">Aktivitas Kuliah</a>
    <a onclick="showPage('tentang')">Tentang</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<div class="card">Suhu: <div class="big" id="temp">--</div></div>
<div class="card">Kelembapan: <div class="big" id="hum">--</div></div>
<div class="card">Cahaya: <div class="big" id="light">--</div></div>
</div>

<!-- TENTANG -->
<div id="tentang" class="section">
<h2>Tentang</h2>

<div class="card">
<p style="text-align:center;">Dashboard Monitoring IoT berbasis Cloud & AWS</p>
<div class="profile"><div class="profile-name">Herawati Syalomita Pangaribuan</div></div>
</div>

</div>

</div>

<script>
const API="https://o6teddrptd.execute-api.ap-southeast-1.amazonaws.com/prod";

function toggleMenu(){sidebar.classList.toggle("active");}

function showPage(p){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

async function getSensor(){
const r=await fetch(API+"/sensor");
const d=await r.json();
const x=d[d.length-1];

temp.innerText=x.temperature;
hum.innerText=x.humidity;
light.innerText=x.light;

temp2.innerText=x.temperature;
hum2.innerText=x.humidity;
light2.innerText=x.light;
}

async function getActivities(){
const r=await fetch(API+"/activities");
const d=await r.json();

let h="";
d.forEach(a=>{
h+=`
<div class="list-item">
<strong>${a.judul}</strong>
<span>${a.tanggal}</span>
<div style="color:#22c55e;font-size:12px">${a.kategori || "Umum"}</div>
</div>
`;
});
list.innerHTML=h;
}

async function tambah(){
await fetch(API+"/activities",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
judul:judul.value,
tanggal:tanggal.value,
kategori:topik.value || "Umum"
})
});
alert("Tersimpan");
resetForm();
getActivities();
}

function resetForm(){
document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

getSensor();
getActivities();
setInterval(getSensor,3000);
</script>

</body>
</html>
