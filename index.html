<script>
const API="https://o6teddrptd.execute-api.ap-southeast-1.amazonaws.com/prod";

/* AMANIN ELEMENT */
function el(id){
    return document.getElementById(id);
}

/* MENU */
function toggleMenu(){
    const sb = el("sidebar");
    if(sb) sb.classList.toggle("active");
}

function showPage(p){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    const page = el(p);
    if(page) page.classList.add("active");
}

/* SENSOR (ANTI ERROR + ANIMASI SEDIKIT) */
async function getSensor(){
try{
    const r=await fetch(API+"/sensor");
    const d=await r.json();

    if(!d || d.length===0) return;

    const x=d[d.length-1];

    updateValue("temp", x.temperature, "°C");
    updateValue("hum", x.humidity, "%");
    updateValue("light", x.light, "lux");

    updateValue("temp2", x.temperature);
    updateValue("hum2", x.humidity);
    updateValue("light2", x.light);

}catch(e){
    console.log("Sensor error:",e);
}
}

/* ANIMASI ANGKA */
function updateValue(id, val, unit=""){
    const e = el(id);
    if(!e) return;

    e.style.transform="scale(1.1)";
    e.innerText = (val ?? "--") + (unit || "");
    setTimeout(()=>{ e.style.transform="scale(1)"; },200);
}

/* AKTIVITAS (FIX PUTIH) */
async function getActivities(){
try{
    const r=await fetch(API+"/activities");
    const d=await r.json();

    if(!Array.isArray(d)) return;

    let h="";

    d.forEach(a=>{
        h+=`
        <div class="list-item">
            <strong>${a.judul || "-"}</strong><br>
            <small>${a.tanggal || "-"}</small><br>
            <div style="color:#22c55e;font-size:12px">
                ${a.kategori || "Umum"}
            </div>
        </div>
        `;
    });

    const listEl = el("list");
    if(listEl) listEl.innerHTML=h;

}catch(e){
    console.log("Aktivitas error:",e);
}
}

/* SIMPAN */
async function tambah(){
try{
    await fetch(API+"/activities",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            judul: el("judul")?.value,
            tanggal: el("tanggal")?.value,
            kategori: el("topik")?.value || "Umum"
        })
    });

    alert("Tersimpan");
    resetForm();
    getActivities();

}catch(e){
    alert("Gagal simpan");
    console.log(e);
}
}

/* RESET */
function resetForm(){
    document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

/* INIT */
getSensor();
getActivities();

setInterval(getSensor,3000);
</script>
